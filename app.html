<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bela Caixa</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#b14f4f">
  <style>
    :root{
      --bg:#f7f7fb; --card:#fff; --txt:#1f2937; --muted:#6b7280; --line:#e5e7eb;
      --red:#b14f4f; --red2:#8f3e3e; --shadow:0 10px 26px rgba(0,0,0,.08);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt)}
    .top{background:linear-gradient(135deg,var(--red2),var(--red));color:#fff;padding:22px 18px 26px;border-bottom-left-radius:26px;border-bottom-right-radius:26px;box-shadow:var(--shadow)}
    .top h1{margin:0;font-size:24px}
    .top p{margin:6px 0 0;font-size:13px;opacity:.92}
    .wrap{max-width:760px;margin:0 auto;padding:18px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:var(--shadow)}
    .grid{display:grid;grid-template-columns:1fr;gap:14px;margin-top:12px}
    .linkcard{display:block;text-decoration:none;color:inherit;background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px}
    .linkcard b{display:block;font-size:18px}
    .linkcard span{display:block;color:var(--muted);font-size:13px;margin-top:6px}
    .hint{font-size:12px;color:var(--muted);margin-top:14px}
    @media (min-width:720px){ .grid{grid-template-columns:1fr 1fr;} }
  </style>
</head>
<body>
  <div class="top">
    <h1>Bela Caixa</h1>
    <p>Escolha como deseja abrir o sistema.</p>
  </div>
  <div class="wrap">
    <div class="card">
      <div style="font-size:18px;font-weight:800">Acesso rápido</div>
      <div class="grid">
        <a class="linkcard" href="./index.html">
          <b>🖥 Desktop</b>
          <span>Versão completa para computador.</span>
        </a>
        <a class="linkcard" href="./mobile.html">
          <b>📱 Mobile</b>
          <span>Base segura 3 para celular.</span>
        </a>
      </div>
      <div class="hint">Depois de instalar, você pode abrir esta tela e escolher Desktop ou Mobile.</div>
    </div>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function(){
        navigator.serviceWorker.register('./sw.js').catch(function(){});
      });
    }
  </script>

<script src="./sheets-config.js"></script>
<script src="./sheets-sync.js"></script>
</body>
</html>
