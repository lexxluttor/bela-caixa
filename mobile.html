<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Bela Modas • Mobile Consulta</title>
  <style>
    :root{
      --bg:#f7f3f1;--card:#ffffff;--ink:#241b1a;--muted:#7c6d69;--brand:#b14f4f;--brand-2:#8d3e3e;
      --ok:#1f7a4d;--warn:#c27a13;--danger:#b42318;--line:#eadfda;--shadow:0 10px 24px rgba(38,22,20,.08);
      --radius:18px;--green:#3e7f57;--blue:#4c79b8;--red:#9e5454;--gold:#8b6a2b
    }
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#f8f4f2 0%,#f6f0ed 100%);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    .app{max-width:900px;margin:0 auto;padding:env(safe-area-inset-top) 14px calc(24px + env(safe-area-inset-bottom))}
    .top{position:sticky;top:0;z-index:20;backdrop-filter:blur(10px);background:rgba(248,244,242,.92);padding:10px 0 12px}
    .brand{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
    .brand h1{margin:0;font-size:22px;line-height:1.1}.sub{color:var(--muted);font-size:13px;margin-top:4px}
    .pill{border:none;background:var(--brand);color:#fff;font-weight:800;border-radius:999px;padding:10px 14px;box-shadow:var(--shadow);cursor:pointer}
    .pill.secondary{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:none}
    .tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .tab{border:none;padding:12px 10px;border-radius:14px;background:#fff;color:var(--ink);font-weight:800;cursor:pointer;border:1px solid var(--line)}
    .tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}
    .status{margin-top:10px;font-size:12px;color:var(--muted)} .view{display:none;padding-top:14px}.view.active{display:block}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}.field{flex:1 1 180px}
    input,select{width:100%;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:14px;padding:12px;font-size:15px;outline:none}
    .grid{display:grid;gap:12px}.grid.cards{grid-template-columns:repeat(2,minmax(0,1fr))}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
    .metric{border-left:4px solid var(--line)} .metric.green{border-left-color:var(--green)} .metric.blue{border-left-color:var(--blue)} .metric.red{border-left-color:var(--red)} .metric.gold{border-left-color:var(--gold)}
    .metric .label{font-size:12px;color:#5e5552;text-transform:uppercase;letter-spacing:.04em;font-weight:800;margin-bottom:8px}
    .metric .value{font-size:22px;font-weight:900;margin-bottom:6px}.metric .subline{color:var(--muted);font-size:13px}
    .row{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.muted{color:var(--muted)}.small{font-size:12px}
    .list{display:grid;gap:10px}.item{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px}.highlight{color:var(--brand-2);font-weight:900}.empty{text-align:center;color:var(--muted);padding:20px 10px}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px} table{width:100%;border-collapse:collapse;background:#fff;min-width:520px} th,td{padding:12px 10px;border-bottom:1px solid #efe5e1;text-align:left;font-size:14px} th{color:#6c625e;font-size:12px;text-transform:uppercase;letter-spacing:.04em;background:#faf6f4} td.num{text-align:right;font-weight:700} tr:last-child td{border-bottom:none}
    .detail-month-grid{display:grid;grid-template-columns:1fr;gap:12px}
    .detail-month-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px}
    .detail-month-title{font-size:15px;font-weight:800;margin-bottom:8px;color:var(--ink)}
    .detail-month-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #efe5e1}
    .detail-month-row:last-child{border-bottom:none}
    .detail-month-label{color:#5f5651}
    .detail-month-value{font-weight:800;color:var(--brand-2);text-align:right}
    @media (min-width:720px){.detail-month-grid{grid-template-columns:1fr 1fr}}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800;background:#f1e8e5;color:#6e4f49}
    .badge.ok{background:#e7f6ee;color:var(--ok)} .badge.warn{background:#fff4df;color:var(--warn)} .badge.danger{background:#fdebea;color:var(--danger)}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.btn{border:none;border-radius:12px;padding:10px 12px;cursor:pointer;font-weight:800;background:var(--brand);color:#fff}
    .btn.light{background:#fff;color:var(--ink);border:1px solid var(--line)}
    .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .fbtn{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:10px 12px;font-weight:800;cursor:pointer}
    .fbtn.active{background:var(--brand);color:#fff;border-color:var(--brand)}
    @media (min-width:760px){.grid.cards{grid-template-columns:repeat(4,minmax(0,1fr))}}
  </style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="brand">
      <div><h1>Bela Modas</h1><div class="sub">Mobile consulta</div></div>
      <button class="pill" id="btnAtualizarTop">Atualizar</button>
    </div>
    <div class="tabs">
      <button class="tab active" data-view="caixaView">Caixa</button>
      <button class="tab" data-view="relatoriosView">Relatórios</button>
      <button class="tab" data-view="cobrancasView">Cobranças</button>
    </div>
    <div class="status" id="statusSync">Carregando...</div>
  </div>

  <section class="view active" id="caixaView">
    <div class="card">
      <h2 style="margin:0 0 10px">Caixa do dia</h2>
      <div class="toolbar">
        <div class="field"><input type="date" id="caixaData" /></div>
        <button class="pill secondary" id="btnHoje">Hoje</button>
        <button class="pill" id="btnConsultarCaixa">Consultar</button>
      </div>
    </div>
    <div class="grid cards" id="caixaCards"></div>
    <div class="card">
      <h3 style="margin:0 0 10px">Por forma de pagamento</h3>
      <div class="table-wrap">
        <table><thead><tr><th>Forma</th><th class="num">Vendas</th><th class="num">Recebimentos</th><th class="num">Total</th></tr></thead><tbody id="caixaTabelaForma"></tbody></table>
      </div>
    </div>
    <div class="card">
      <div class="row"><h3 style="margin:0">Movimentações</h3><div class="small muted" id="movResumo"></div></div>
      <div class="list" id="listaMovimentacoes" style="margin-top:10px"></div>
    </div>
  </section>

  <section class="view" id="relatoriosView">
    <div class="grid cards" id="relatorioCards"></div>
    <div class="card"><h3 style="margin:0 0 10px">Top clientes do mês</h3><div class="list" id="topClientes"></div></div>
    <div class="card"><h3 style="margin:0 0 10px">Produtos mais vendidos do mês</h3><div class="list" id="topProdutos"></div></div>
  </section>

  <section class="view" id="cobrancasView">
    <div class="card">
      <h2 style="margin:0 0 10px">Cobranças</h2>
      <div class="toolbar">
        <div class="field"><input type="search" id="buscaCobranca" placeholder="Buscar cliente..." /></div>
      </div>
      <div class="filter-row">
        <button class="fbtn active" data-cfilter="todos">Todos os devedores</button>
        <button class="fbtn" data-cfilter="28">28 dias</button>
        <button class="fbtn" data-cfilter="30">30 dias ou +</button>
      </div>
    </div>
    <div class="grid cards" id="cobrancaCards"></div>
    <div class="card"><h3 style="margin:0 0 10px">Lista de devedores</h3><div class="list" id="listaCobrancas"></div></div>
  </section>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbzH4m2rIWkzHLf_SPldVWBk6uSbhmwWz_OLZENRr0A-9XOzCtHsU5fbLtJCm-ZKss0k/exec";
const REFRESH_MS=15*60*1000;
let DATA={clientes:[],produtos:[],vendas:[],recebimentos:[],cobrancas:[]};
let COBRANCA_FILTER='todos';

function pad2(n){return String(n).padStart(2,'0')}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())}
function brMoney(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function escapeHtml(str){return String(str==null?'':str).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#39;")}
function safeJson(text,fallback){try{return JSON.parse(text)}catch(e){return fallback}}
function parseAnyDate(v){
  if(!v) return null;
  if(v instanceof Date) return isNaN(v.getTime()) ? null : v;
  const s=String(v).trim();
  let m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m){
    const d=new Date(Number(m[1]), Number(m[2])-1, Number(m[3]), 0, 0, 0);
    return isNaN(d.getTime()) ? null : d;
  }
  m=s.match(/^(\d{4})-(\d{2})-(\d{2})[T\s](\d{2}):(\d{2})(?::(\d{2}))?$/);
  if(m){
    const d=new Date(Number(m[1]), Number(m[2])-1, Number(m[3]), Number(m[4]), Number(m[5]), Number(m[6]||0));
    return isNaN(d.getTime()) ? null : d;
  }
  m=s.match(/^(\d{2})\/(\d{2})\/(\d{4})(?:[ T](\d{2}):(\d{2})(?::(\d{2}))?)?$/);
  if(m){
    const d=new Date(Number(m[3]), Number(m[2])-1, Number(m[1]), Number(m[4]||0), Number(m[5]||0), Number(m[6]||0));
    return isNaN(d.getTime()) ? null : d;
  }
  const d=new Date(s);
  return isNaN(d.getTime()) ? null : d;
}
function rowStamp(row){
  const d=parseAnyDate(row.updatedAt||row.data||row.createdAt||0);
  return d ? d.getTime() : 0;
}
function activeRows(rows){return (rows||[]).filter(r=>!r.deletedAt)}
function ymdFromAny(v){
  const d=parseAnyDate(v);
  return d ? d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()) : '';
}
function hmFromAny(v){
  const d=parseAnyDate(v);
  return d ? pad2(d.getHours())+':'+pad2(d.getMinutes()) : '';
}
function openStatuses(text,isError){
  const el=document.getElementById('statusSync');
  const time=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  el.textContent=`${text} • ${time}`;
  el.style.color=isError?'#b42318':'#7c6d69';
}
function cardMetric(label,value,subline,color){
  return `<div class="card metric ${color||''}"><div class="label">${escapeHtml(label)}</div><div class="value">${escapeHtml(value)}</div><div class="subline">${escapeHtml(subline||'')}</div></div>`;
}
async function carregarDados(){
  openStatuses('Atualizando...',false);
  try{
    const res=await fetch(API_URL,{method:'GET',cache:'no-store'});
    if(!res.ok) throw new Error('Falha ao buscar dados');
    const text=await res.text();
    const raw=safeJson(text,null);
    if(!raw) throw new Error('Resposta inválida do servidor');
    if(raw.ok===false) throw new Error(raw.error||'Erro retornado pelo servidor');
    DATA.clientes=activeRows(raw.clientes||[]);
    DATA.produtos=activeRows(raw.produtos||[]);
    DATA.vendas=activeRows(raw.vendas||[]);
    DATA.recebimentos=activeRows(raw.recebimentos||[]);
    DATA.cobrancas=activeRows(raw.cobrancas||[]);
    renderTudo();
    openStatuses('Atualizado com sucesso',false);
  }catch(err){
    console.error(err);
    renderTudo();
    openStatuses('Não foi possível atualizar agora',true);
  }
}
function normalizeFormaVenda(v){
  return String(v.forma_pagamento||v.forma||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}
function isCrediarioVenda(v){
  const forma=normalizeFormaVenda(v);
  return forma.includes('crediario') || forma.includes('fiado');
}
function isVistaVenda(v){ return !isCrediarioVenda(v); }

function buildCaixa(dateStr){
  const vendasDia=DATA.vendas.filter(v=>ymdFromAny(v.data||v.createdAt||v.updatedAt)===dateStr);
  const recebDia=DATA.recebimentos.filter(r=>ymdFromAny(r.data||r.createdAt||r.updatedAt)===dateStr);
  const vendasVista=vendasDia.filter(isVistaVenda);
  const novasCred=vendasDia.filter(isCrediarioVenda);
  const totalVendasVista=vendasVista.reduce((s,v)=>s+Number(v.total||0),0);
  const totalRecebCred=recebDia.reduce((s,r)=>s+Number(r.valor||0),0);
  const totalNovoCred=novasCred.reduce((s,v)=>s+Number(v.total||0),0);
  const totalCaixa=totalVendasVista+totalRecebCred;

  const formas={};
  const ensureForma=(name)=>{ if(!formas[name]) formas[name]={nome:name,vendas:0,recebimentos:0}; return formas[name]; };

  vendasDia.forEach(v=>{
    let forma=String(v.forma_pagamento||v.forma||'').trim()||'Não informado';
    if(isCrediarioVenda(v)){ forma='Crediário (novo)'; }
    else{
      const f=normalizeFormaVenda(v);
      if(f==='credito') forma='Crédito';
      else if(f==='debito') forma='Débito';
      else if(f==='pix') forma='Pix';
      else if(f==='dinheiro') forma='Dinheiro';
    }
    ensureForma(forma).vendas += Number(v.total||0);
  });

  recebDia.forEach(r=>{
    let forma=String(r.forma_pagamento||'').trim()||'Recebimento';
    const f=forma.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
    if(f==='credito') forma='Crédito';
    else if(f==='debito') forma='Débito';
    else if(f==='pix') forma='Pix';
    else if(f==='dinheiro') forma='Dinheiro';
    ensureForma(forma).recebimentos += Number(r.valor||0);
  });

  const movs=[];
  vendasDia.forEach(v=>{
    movs.push({
      tipo:'Venda', nome:v.cliente||'Balcão', hora:hmFromAny(v.data||v.createdAt||v.updatedAt)||'--:--',
      forma:String(v.forma_pagamento||v.forma||'-'), valor:Number(v.total||0), stamp:rowStamp(v),
      detalheItens:(()=>{const itens=safeJson(v.itens_json||'[]',[]); if(!Array.isArray(itens)||!itens.length)return ''; return itens.map(i=>`${i.qtd||1}x ${i.desc||i.nome||'Item'}`).slice(0,3).join(', ')})()
    })
  });
  recebDia.forEach(r=>{
    movs.push({
      tipo:'Recebimento', nome:resolveClienteDeRecebimento(r), hora:hmFromAny(r.data||r.createdAt||r.updatedAt)||'--:--',
      forma:String(r.forma_pagamento||'Recebimento'), valor:Number(r.valor||0), stamp:rowStamp(r), detalheItens:r.obs||''
    })
  });
  movs.sort((a,b)=>b.stamp-a.stamp);
  return {vendasDia,recebDia,vendasVista,novasCred,totalVendasVista,totalRecebCred,totalNovoCred,totalCaixa,formas,movs};
}
function renderCaixa(){
  const dateStr=document.getElementById('caixaData').value||todayStr();
  const c=buildCaixa(dateStr);
  document.getElementById('caixaCards').innerHTML=[
    cardMetric('Vendas vista',brMoney(c.totalVendasVista),`${c.vendasVista.length} venda(s)`,'green'),
    cardMetric('Receb. crediário',brMoney(c.totalRecebCred),`${c.recebDia.length} recebimento(s)`,'blue'),
    cardMetric('Novo crediário',brMoney(c.totalNovoCred),`${c.novasCred.length} venda(s)`,'red'),
    cardMetric('Total caixa',brMoney(c.totalCaixa),'Vista + recebimentos','gold')
  ].join('');
  const ordem=Object.values(c.formas).sort((a,b)=>(b.vendas+b.recebimentos)-(a.vendas+a.recebimentos));
  document.getElementById('caixaTabelaForma').innerHTML=ordem.length
    ? ordem.map(f=>`<tr><td>${escapeHtml(f.nome)}</td><td class="num">${escapeHtml(brMoney(f.vendas))}</td><td class="num">${escapeHtml(brMoney(f.recebimentos))}</td><td class="num">${escapeHtml(brMoney(f.vendas+f.recebimentos))}</td></tr>`).join('') +
      `<tr><td><strong>TOTAL</strong></td><td class="num"><strong>${escapeHtml(brMoney(ordem.reduce((s,f)=>s+f.vendas,0)))}</strong></td><td class="num"><strong>${escapeHtml(brMoney(ordem.reduce((s,f)=>s+f.recebimentos,0)))}</strong></td><td class="num"><strong>${escapeHtml(brMoney(ordem.reduce((s,f)=>s+f.vendas+f.recebimentos,0)))}</strong></td></tr>`
    : '<tr><td colspan="4" class="muted">Sem movimentações para esta data.</td></tr>';
  document.getElementById('movResumo').textContent=`${c.movs.length} movimentação(ões)`;
  document.getElementById('listaMovimentacoes').innerHTML=c.movs.length
    ? c.movs.map(m=>`<div class="item"><div class="row"><div><div><strong>${escapeHtml(m.tipo)} — ${escapeHtml(m.nome)}</strong></div><div class="small muted">${escapeHtml(m.hora)} • ${escapeHtml(m.forma)}</div></div><div class="highlight">${escapeHtml(brMoney(m.valor))}</div></div>${m.detalheItens?`<div class="small muted" style="margin-top:8px">${escapeHtml(m.detalheItens)}</div>`:''}</div>`).join('')
    : '<div class="empty">Nenhuma movimentação encontrada para esta data.</div>';
}
function resolveClienteDeRecebimento(r){
  const vendaId=String(r.venda_id||'');
  if(vendaId.startsWith('cid:')){ const cid=vendaId.slice(4); const cli=DATA.clientes.find(c=>String(c.id)===cid); return cli?cli.nome:'Cliente'; }
  const venda=DATA.vendas.find(v=>String(v.id)===vendaId);
  if(venda) return venda.cliente || 'Cliente';
  if(r.cid){ const cli=DATA.clientes.find(c=>String(c.id)===String(r.cid)); if(cli) return cli.nome; }
  return 'Cliente';
}
function renderRelatorios(){
  const mes=todayStr().slice(0,7);
  const vendasMes=DATA.vendas.filter(v=>ymdFromAny(v.data||v.createdAt||v.updatedAt).startsWith(mes));
  const recebimentosMes=DATA.recebimentos.filter(r=>ymdFromAny(r.data||r.createdAt||r.updatedAt).startsWith(mes));

  const vendasVistaMes=vendasMes.filter(isVistaVenda);
  const vendasCredMes=vendasMes.filter(isCrediarioVenda);

  const totalVistaMes=vendasVistaMes.reduce((s,v)=>s+Number(v.total||0),0);
  const totalCredMes=vendasCredMes.reduce((s,v)=>s+Number(v.total||0),0);
  const recebidoMes=recebimentosMes.reduce((s,r)=>s+Number(r.valor||0),0);
  const totalMes=totalVistaMes + totalCredMes;
  const ticketMes=vendasMes.length?totalMes/vendasMes.length:0;

  const porVista={pix:0,dinheiro:0,cartaoCredito:0,cartaoDebito:0};
  vendasVistaMes.forEach(v=>{
    const f=normalizeFormaVenda(v);
    const valor=Number(v.total||0);
    if(f==='pix') porVista.pix += valor;
    else if(f==='dinheiro') porVista.dinheiro += valor;
    else if(f==='credito') porVista.cartaoCredito += valor;
    else if(f==='debito') porVista.cartaoDebito += valor;
  });

  document.getElementById('relatorioCards').innerHTML=[
    cardMetric('À vista no mês',brMoney(totalVistaMes),`${vendasVistaMes.length} venda(s)`,'green'),
    cardMetric('Crediário no mês',brMoney(totalCredMes),`${vendasCredMes.length} venda(s)`,'blue'),
    cardMetric('Recebido no mês',brMoney(recebidoMes),`${recebimentosMes.length} recebimento(s)`,'gold'),
    cardMetric('Ticket médio mês',brMoney(ticketMes),'Média por venda','red')
  ].join('');

  const relatorioCards=document.getElementById('relatorioCards');
  let detalhe=document.getElementById('relatorioVistaDetalhe');
  if(!detalhe){
    detalhe=document.createElement('div');
    detalhe.id='relatorioVistaDetalhe';
    detalhe.className='card';
    relatorioCards.insertAdjacentElement('afterend', detalhe);
  }
  const porReceb={pix:0,dinheiro:0,cartaoCredito:0,cartaoDebito:0};
  recebimentosMes.forEach(r=>{
    const f=String(r.forma_pagamento||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
    const valor=Number(r.valor||0);
    if(f==='pix') porReceb.pix += valor;
    else if(f==='dinheiro') porReceb.dinheiro += valor;
    else if(f==='credito') porReceb.cartaoCredito += valor;
    else if(f==='debito') porReceb.cartaoDebito += valor;
  });

  detalhe.innerHTML=`
    <h3 style="margin:0 0 12px">Detalhamento do mês</h3>
    <div class="detail-month-grid">
      <div class="detail-month-card">
        <div class="detail-month-title">D. venda à vista</div>
        <div class="detail-month-row"><span class="detail-month-label">Pix</span><span class="detail-month-value">${brMoney(porVista.pix)}</span></div>
        <div class="detail-month-row"><span class="detail-month-label">Dinheiro</span><span class="detail-month-value">${brMoney(porVista.dinheiro)}</span></div>
        <div class="detail-month-row"><span class="detail-month-label">Cartão crédito</span><span class="detail-month-value">${brMoney(porVista.cartaoCredito)}</span></div>
        <div class="detail-month-row"><span class="detail-month-label">Cartão débito</span><span class="detail-month-value">${brMoney(porVista.cartaoDebito)}</span></div>
        <div class="detail-month-row"><span class="detail-month-label"><strong>Total</strong></span><span class="detail-month-value"><strong>${brMoney(porVista.pix + porVista.dinheiro + porVista.cartaoCredito + porVista.cartaoDebito)}</strong></span></div>
      </div>
      <div class="detail-month-card">
        <div class="detail-month-title">D. recebimento</div>
        <div class="detail-month-row"><span class="detail-month-label">Pix</span><span class="detail-month-value">${brMoney(porReceb.pix)}</span></div>
        <div class="detail-month-row"><span class="detail-month-label">Dinheiro</span><span class="detail-month-value">${brMoney(porReceb.dinheiro)}</span></div>
        <div class="detail-month-row"><span class="detail-month-label">Cartão crédito</span><span class="detail-month-value">${brMoney(porReceb.cartaoCredito)}</span></div>
        <div class="detail-month-row"><span class="detail-month-label">Cartão débito</span><span class="detail-month-value">${brMoney(porReceb.cartaoDebito)}</span></div>
        <div class="detail-month-row"><span class="detail-month-label"><strong>Total</strong></span><span class="detail-month-value"><strong>${brMoney(porReceb.pix + porReceb.dinheiro + porReceb.cartaoCredito + porReceb.cartaoDebito)}</strong></span></div>
      </div>
    </div>
  `;

  const topClientes=new Map();
  vendasMes.forEach(v=>{ const nome=String(v.cliente||'Balcão'); topClientes.set(nome,(topClientes.get(nome)||0)+Number(v.total||0)); });
  const topClientesList=[...topClientes.entries()].sort((a,b)=>b[1]-a[1]).slice(0,5);
  document.getElementById('topClientes').innerHTML=topClientesList.length
    ? topClientesList.map(([nome,valor],idx)=>`<div class="item"><div class="row"><div><strong>${idx+1}. ${escapeHtml(nome)}</strong></div><div class="highlight">${escapeHtml(brMoney(valor))}</div></div></div>`).join('')
    : '<div class="empty">Sem dados suficientes no mês atual.</div>';

  const topProdutos=new Map();
  vendasMes.forEach(v=>{ const itens=safeJson(v.itens_json||'[]',[]); if(!Array.isArray(itens)) return; itens.forEach(i=>{ const nome=String(i.desc||i.nome||'Produto'); const qtd=Number(i.qtd||1); topProdutos.set(nome,(topProdutos.get(nome)||0)+qtd); }); });
  const topProdutosList=[...topProdutos.entries()].sort((a,b)=>b[1]-a[1]).slice(0,5);
  document.getElementById('topProdutos').innerHTML=topProdutosList.length
    ? topProdutosList.map(([nome,qtd],idx)=>`<div class="item"><div class="row"><div><strong>${idx+1}. ${escapeHtml(nome)}</strong></div><div class="highlight">${qtd} un.</div></div></div>`).join('')
    : '<div class="empty">Sem itens vendidos suficientes no mês atual.</div>';
}
function formatBrDate(ymd){ if(!ymd||!/^\d{4}-\d{2}-\d{2}$/.test(ymd)) return ''; const [y,m,d]=ymd.split('-'); return `${d}/${m}/${y}`; }
function resolveTelefoneCliente(nome,cid){
  const byId=DATA.clientes.find(c=>String(c.id||'')===String(cid||'')); const raw=byId?(byId.telefone||byId.tel||''):'';
  if(raw) return String(raw).replace(/\D/g,'');
  const byName=DATA.clientes.find(c=>String(c.nome||'').toLowerCase()===String(nome||'').toLowerCase()); const raw2=byName?(byName.telefone||byName.tel||''):'';
  return raw2?String(raw2).replace(/\D/g,''):'';
}
function montarMensagem(nome,valor,vencimento,tom){
  const dataTxt=formatBrDate(vencimento)||'sem data definida';
  if(tom==='leve') return `Olá ${nome}, tudo bem? Passando para lembrar sobre o valor pendente de ${valor}, com vencimento em ${dataTxt}. Qualquer dúvida, me chame.`;
  return `Olá ${nome}. Identificamos um pagamento pendente no valor de ${valor}, com vencimento em ${dataTxt}. Pedimos, por gentileza, a regularização. Obrigado.`;
}
function enviarWhatsapp(tel,msg){ const url=tel?`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`:`https://wa.me/?text=${encodeURIComponent(msg)}`; window.open(url,'_blank'); }
async function copiarMensagem(msg){ try{ await navigator.clipboard.writeText(msg); openStatuses('Mensagem copiada',false);}catch(e){ openStatuses('Não foi possível copiar',true);} }

function addMonthsKeepDay(ymd, months){
  if(!ymd) return '';
  const [y,m,d]=ymd.split('-').map(Number);
  if(!y||!m||!d) return '';
  const first=new Date(y, m-1+months, 1);
  const lastDay=new Date(first.getFullYear(), first.getMonth()+1, 0).getDate();
  const day=Math.min(d, lastDay);
  const out=new Date(first.getFullYear(), first.getMonth(), day);
  return out.getFullYear()+'-'+pad2(out.getMonth()+1)+'-'+pad2(out.getDate());
}
function diffDays(fromYmd, toYmd){
  if(!fromYmd || !toYmd) return 0;
  const a=new Date(fromYmd+'T00:00:00');
  const b=new Date(toYmd+'T00:00:00');
  return Math.floor((b-a)/(1000*60*60*24));
}
function resolveNomeClientePorCid(cid){
  if(!cid) return '';
  const cli=DATA.clientes.find(c=>String(c.id||'')===String(cid));
  return cli ? (cli.nome||'') : '';
}
function statusDebtByDue(venc){
  const hoje=todayStr();
  if(!venc) return {text:'Sem vencimento', cls:''};
  if(venc < hoje) return {text:'Vencida', cls:'danger'};
  if(venc === hoje) return {text:'Vence hoje', cls:'warn'};
  return {text:'Em aberto', cls:'ok'};
}

function buildDebtEntries(){
  const salesCred = DATA.vendas.filter(isCrediarioVenda);
  const payByVid = new Map();
  const payByCid = new Map();

  DATA.recebimentos.forEach(r=>{
    const valor=Number(r.valor||0);
    if(valor<=0) return;
    const vid=String(r.venda_id||'');
    if(vid && !vid.startsWith('cid:')){
      if(!payByVid.has(vid)) payByVid.set(vid, []);
      payByVid.get(vid).push({valor, data:ymdFromAny(r.data||r.createdAt||r.updatedAt), stamp:rowStamp(r), raw:r});
    }
    let cid='';
    if(vid.startsWith('cid:')) cid=vid.slice(4);
    if(!cid && r.cid) cid=String(r.cid);
    if(cid){
      if(!payByCid.has(cid)) payByCid.set(cid, []);
      payByCid.get(cid).push({valor, data:ymdFromAny(r.data||r.createdAt||r.updatedAt), stamp:rowStamp(r), raw:r});
    }
  });

  const rawRows = [];
  salesCred.forEach(v=>{
    const vid=String(v.id||'');
    const cid=String(v.cid||'');
    const nome=v.cliente || resolveNomeClientePorCid(cid) || 'Cliente';
    const dataCompra=ymdFromAny(v.data||v.createdAt||v.updatedAt);
    const listaPag = vid && payByVid.has(vid) ? payByVid.get(vid).slice().sort((a,b)=>a.stamp-b.stamp)
                    : (cid && payByCid.has(cid) ? payByCid.get(cid).slice().sort((a,b)=>a.stamp-b.stamp) : []);
    const totalPago = listaPag.reduce((s,p)=>s+Number(p.valor||0),0);
    const saldo = Number(v.total||0) - totalPago;
    if(saldo <= 0.009) return;

    const ultimoPagamento = listaPag.length ? listaPag[listaPag.length-1].data : '';
    const proximoVencimento = ultimoPagamento ? addMonthsKeepDay(ultimoPagamento, 1) : addMonthsKeepDay(dataCompra, 1);
    const diasParaFiltro = diffDays(dataCompra, todayStr());

    rawRows.push({
      vid, cid, nome,
      telefone: resolveTelefoneCliente(nome, cid),
      valorOriginal: Number(v.total||0),
      totalPago,
      saldo,
      dataCompra,
      ultimoPagamento,
      proximoVencimento,
      diasBaseCompra: diasParaFiltro,
      origem: 'venda'
    });
  });

  DATA.cobrancas.forEach(c=>{
    const st=String(c.status||'aberto').toLowerCase();
    if(st==='pago') return;
    const valor=Number(c.valor||0);
    if(valor<=0) return;
    const vid=String(c.vid||'');
    if(vid && rawRows.some(r=>r.vid===vid)) return;
    const cid=String(c.cid||'');
    const nome=c.cliente || resolveNomeClientePorCid(cid) || 'Cliente';
    const dataBase=ymdFromAny(c.data||c.createdAt||c.updatedAt);
    const proximoVencimento=ymdFromAny(c.vencimento||'') || addMonthsKeepDay(dataBase,1);

    rawRows.push({
      vid, cid, nome,
      telefone: resolveTelefoneCliente(nome,cid),
      valorOriginal: valor,
      totalPago: 0,
      saldo: valor,
      dataCompra: dataBase,
      ultimoPagamento: '',
      proximoVencimento,
      diasBaseCompra: diffDays(dataBase, todayStr()),
      origem: 'cobranca'
    });
  });

  const grouped = new Map();
  rawRows.forEach(r=>{
    const key = String(r.cid || '').trim() ? 'cid:' + String(r.cid).trim() : 'nome:' + String(r.nome || '').trim().toLowerCase();
    if(!grouped.has(key)){
      grouped.set(key, {
        cid: r.cid,
        nome: r.nome,
        telefone: r.telefone,
        valorOriginal: 0,
        totalPago: 0,
        saldo: 0,
        dataCompra: r.dataCompra || '',
        ultimoPagamento: r.ultimoPagamento || '',
        proximoVencimento: r.proximoVencimento || '',
        diasBaseCompra: r.diasBaseCompra || 0,
        compras: 0,
        vids: []
      });
    }

    const g = grouped.get(key);
    g.valorOriginal += Number(r.valorOriginal || 0);
    g.totalPago += Number(r.totalPago || 0);
    g.saldo += Number(r.saldo || 0);
    g.compras += 1;
    if(r.vid) g.vids.push(r.vid);

    if(r.dataCompra && (!g.dataCompra || r.dataCompra < g.dataCompra)) g.dataCompra = r.dataCompra;
    if(r.ultimoPagamento && (!g.ultimoPagamento || r.ultimoPagamento > g.ultimoPagamento)) g.ultimoPagamento = r.ultimoPagamento;
    if(r.proximoVencimento && (!g.proximoVencimento || r.proximoVencimento < g.proximoVencimento)) g.proximoVencimento = r.proximoVencimento;
    if(Number(r.diasBaseCompra || 0) > Number(g.diasBaseCompra || 0)) g.diasBaseCompra = Number(r.diasBaseCompra || 0);
    if(!g.telefone && r.telefone) g.telefone = r.telefone;
  });

  return [...grouped.values()].filter(r => Number(r.saldo || 0) > 0.009);
}

function filterDebts(rows){
  if(COBRANCA_FILTER==='todos') return rows;
  if(COBRANCA_FILTER==='28') return rows.filter(r => r.diasBaseCompra >= 28);
  if(COBRANCA_FILTER==='30') return rows.filter(r => r.diasBaseCompra >= 30);
  return rows;
}

function renderCobrancas(){
  const busca=document.getElementById('buscaCobranca').value.trim().toLowerCase();
  let rows = buildDebtEntries();
  rows = rows.filter(r => !busca || String(r.nome||'').toLowerCase().includes(busca));
  rows = filterDebts(rows);
  rows.sort((a,b)=>{
    const av=a.proximoVencimento||'9999-99-99';
    const bv=b.proximoVencimento||'9999-99-99';
    return av.localeCompare(bv) || b.saldo-a.saldo;
  });

  const totalAberto=rows.reduce((s,r)=>s+r.saldo,0);
  const vencidas=rows.filter(r => r.proximoVencimento && r.proximoVencimento < todayStr()).length;

  document.getElementById('cobrancaCards').innerHTML=[
    cardMetric('Qtd. listada',String(rows.length),'Devedores encontrados','blue'),
    cardMetric('Em aberto',brMoney(totalAberto),'Total pendente','red'),
    cardMetric('Vencidas',String(vencidas),'Pelo próximo vencimento','gold'),
    cardMetric('Clientes',String(new Set(rows.map(r=>r.nome)).size),'Nomes distintos','green')
  ].join('');

  document.getElementById('listaCobrancas').innerHTML = rows.length
    ? rows.map(r=>{
        const st=statusDebtByDue(r.proximoVencimento);
        const valor=brMoney(r.saldo);
        const msgLeve=montarMensagem(r.nome, valor, r.proximoVencimento, 'leve');
        const msgNormal=montarMensagem(r.nome, valor, r.proximoVencimento, 'normal');
        const detalhe = [
          `Compra inicial: ${formatBrDate(r.dataCompra)||'-'}`,
          `Pago: ${brMoney(r.totalPago)}`,
          `Últ. pagamento: ${formatBrDate(r.ultimoPagamento)||'-'}`
        ].join(' • ');
        return `<div class="item">
          <div class="row">
            <div>
              <div><strong>${escapeHtml(r.nome)}</strong></div>
              <div class="small muted">Próx. cobrança: ${escapeHtml(formatBrDate(r.proximoVencimento)||'-')}</div>
            </div>
            <div style="text-align:right">
              <div class="highlight">${escapeHtml(valor)}</div>
              <div class="badge ${st.cls}">${escapeHtml(st.text)}</div>
            </div>
          </div>
          <div class="small muted" style="margin-top:8px">${escapeHtml(detalhe)}</div>
          <div class="small muted" style="margin-top:6px">${r.compras} compra(s) em aberto • Saldo restante de ${escapeHtml(brMoney(r.saldo))}.</div>
          <div class="actions">
            <button class="btn" onclick='enviarWhatsapp(${JSON.stringify(r.telefone||"")}, ${JSON.stringify(msgNormal)})'>Enviar cobrança</button>
            <button class="btn light" onclick='copiarMensagem(${JSON.stringify(msgLeve)})'>Copiar leve</button>
            <button class="btn light" onclick='copiarMensagem(${JSON.stringify(msgNormal)})'>Copiar normal</button>
          </div>
        </div>`;
      }).join('')
    : '<div class="empty">Nenhum devedor encontrado com os filtros atuais.</div>';
}

function renderTudo(){ renderCaixa(); renderRelatorios(); renderCobrancas(); }

function bindEvents(){
  document.querySelectorAll('.tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.view).classList.add('active');
    });
  });
  document.querySelectorAll('[data-cfilter]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      COBRANCA_FILTER = btn.dataset.cfilter;
      document.querySelectorAll('[data-cfilter]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderCobrancas();
    });
  });
  document.getElementById('btnAtualizarTop').addEventListener('click', carregarDados);
  document.getElementById('btnConsultarCaixa').addEventListener('click', renderCaixa);
  document.getElementById('btnHoje').addEventListener('click', ()=>{ document.getElementById('caixaData').value=todayStr(); renderCaixa(); });
  document.getElementById('buscaCobranca').addEventListener('input', renderCobrancas);
  document.getElementById('caixaData').addEventListener('change', renderCaixa);
  document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') carregarDados(); });
  window.addEventListener('focus', carregarDados);
}
function init(){
  document.getElementById('caixaData').value=todayStr();
  bindEvents();
  renderTudo();
  carregarDados();
  setInterval(carregarDados, REFRESH_MS);
}
init();
</script>
