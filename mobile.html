<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Bela Modas • Mobile Consulta</title>
  <style>
    :root{
      --bg:#f7f3f1;
      --card:#ffffff;
      --ink:#241b1a;
      --muted:#7c6d69;
      --brand:#b14f4f;
      --brand-2:#8d3e3e;
      --ok:#1f7a4d;
      --warn:#c27a13;
      --danger:#b42318;
      --line:#eadfda;
      --shadow:0 10px 24px rgba(38,22,20,.08);
      --radius:18px;
      --green:#3e7f57;
      --blue:#4c79b8;
      --red:#9e5454;
      --gold:#8b6a2b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:linear-gradient(180deg,#f8f4f2 0%, #f6f0ed 100%);
      color:var(--ink);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    .app{
      max-width:900px;
      margin:0 auto;
      padding:env(safe-area-inset-top) 14px calc(24px + env(safe-area-inset-bottom));
    }
    .top{
      position:sticky; top:0; z-index:20;
      backdrop-filter: blur(10px);
      background:rgba(248,244,242,.92);
      padding:10px 0 12px;
    }
    .brand{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      margin-bottom:12px;
    }
    .brand h1{ margin:0; font-size:22px; line-height:1.1; }
    .sub{ color:var(--muted); font-size:13px; margin-top:4px; }
    .pill{
      border:none; background:var(--brand); color:#fff; font-weight:800;
      border-radius:999px; padding:10px 14px; box-shadow:var(--shadow); cursor:pointer;
    }
    .pill.secondary{
      background:#fff; color:var(--ink); border:1px solid var(--line); box-shadow:none;
    }
    .tabs{
      display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
    }
    .tab{
      border:none; padding:12px 10px; border-radius:14px;
      background:#fff; color:var(--ink); font-weight:800; cursor:pointer; border:1px solid var(--line);
    }
    .tab.active{ background:var(--brand); color:#fff; border-color:var(--brand); }
    .status{ margin-top:10px; font-size:12px; color:var(--muted); }
    .view{ display:none; padding-top:14px; }
    .view.active{ display:block; }

    .toolbar{
      display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:12px;
    }
    .field{ flex:1 1 180px; }
    input,select{
      width:100%;
      border:1px solid var(--line);
      background:#fff;
      color:var(--ink);
      border-radius:14px;
      padding:12px 12px;
      font-size:15px;
      outline:none;
    }

    .grid{ display:grid; gap:12px; }
    .grid.cards{ grid-template-columns:repeat(2,minmax(0,1fr)); }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:14px;
      box-shadow:var(--shadow);
    }
    .metric{
      border-left:4px solid var(--line);
    }
    .metric.green{ border-left-color:var(--green); }
    .metric.blue{ border-left-color:var(--blue); }
    .metric.red{ border-left-color:var(--red); }
    .metric.gold{ border-left-color:var(--gold); }
    .metric .label{
      font-size:12px;
      color:#5e5552;
      text-transform:uppercase;
      letter-spacing:.04em;
      font-weight:800;
      margin-bottom:8px;
    }
    .metric .value{
      font-size:22px;
      font-weight:900;
      margin-bottom:6px;
    }
    .metric .subline{
      color:var(--muted);
      font-size:13px;
    }

    .row{ display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
    .muted{ color:var(--muted); }
    .small{ font-size:12px; }
    .list{ display:grid; gap:10px; }
    .item{
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
    }
    .highlight{ color:var(--brand-2); font-weight:900; }
    .empty{ text-align:center; color:var(--muted); padding:20px 10px; }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:14px;
    }
    table{
      width:100%;
      border-collapse:collapse;
      background:#fff;
      min-width:520px;
    }
    th,td{
      padding:12px 10px;
      border-bottom:1px solid #efe5e1;
      text-align:left;
      font-size:14px;
    }
    th{
      color:#6c625e;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.04em;
      background:#faf6f4;
    }
    td.num{ text-align:right; font-weight:700; }
    tr:last-child td{ border-bottom:none; }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      background:#f1e8e5;
      color:#6e4f49;
    }
    .badge.ok{ background:#e7f6ee; color:var(--ok); }
    .badge.warn{ background:#fff4df; color:var(--warn); }
    .badge.danger{ background:#fdebea; color:var(--danger); }

    .actions{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .btn{
      border:none;
      border-radius:12px;
      padding:10px 12px;
      cursor:pointer;
      font-weight:800;
      background:var(--brand);
      color:#fff;
    }
    .btn.light{
      background:#fff;
      color:var(--ink);
      border:1px solid var(--line);
    }

    @media (min-width:760px){
      .grid.cards{ grid-template-columns:repeat(4,minmax(0,1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div class="brand">
        <div>
          <h1>Bela Modas</h1>
          <div class="sub">Mobile consulta</div>
        </div>
        <button class="pill" id="btnAtualizarTop">Atualizar</button>
      </div>

      <div class="tabs">
        <button class="tab active" data-view="caixaView">Caixa</button>
        <button class="tab" data-view="relatoriosView">Relatórios</button>
        <button class="tab" data-view="cobrancasView">Cobranças</button>
      </div>

      <div class="status" id="statusSync">Carregando...</div>
    </div>

    <section class="view active" id="caixaView">
      <div class="card">
        <h2 style="margin:0 0 10px">Caixa do dia</h2>
        <div class="toolbar">
          <div class="field"><input type="date" id="caixaData" /></div>
          <button class="pill secondary" id="btnHoje">Hoje</button>
          <button class="pill" id="btnConsultarCaixa">Consultar</button>
        </div>
      </div>

      <div class="grid cards" id="caixaCards"></div>

      <div class="card">
        <h3 style="margin:0 0 10px">Por forma de pagamento</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Forma</th>
                <th class="num">Vendas</th>
                <th class="num">Recebimentos</th>
                <th class="num">Total</th>
              </tr>
            </thead>
            <tbody id="caixaTabelaForma"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <div class="row">
          <h3 style="margin:0">Movimentações</h3>
          <div class="small muted" id="movResumo"></div>
        </div>
        <div class="list" id="listaMovimentacoes" style="margin-top:10px"></div>
      </div>
    </section>

    <section class="view" id="relatoriosView">
      <div class="grid cards" id="relatorioCards"></div>

      <div class="card">
        <h3 style="margin:0 0 10px">Top clientes do mês</h3>
        <div class="list" id="topClientes"></div>
      </div>

      <div class="card">
        <h3 style="margin:0 0 10px">Produtos mais vendidos do mês</h3>
        <div class="list" id="topProdutos"></div>
      </div>
    </section>

    <section class="view" id="cobrancasView">
      <div class="card">
        <h2 style="margin:0 0 10px">Cobranças</h2>
        <div class="toolbar">
          <div class="field"><input type="search" id="buscaCobranca" placeholder="Buscar cliente..." /></div>
          <div class="field">
            <select id="filtroCobranca">
              <option value="todas">Todas</option>
              <option value="vencidas">Vencidas</option>
              <option value="hoje">Vencem hoje</option>
              <option value="proximas">Próximas</option>
              <option value="abertas">Somente abertas</option>
            </select>
          </div>
        </div>
      </div>

      <div class="grid cards" id="cobrancaCards"></div>

      <div class="card">
        <h3 style="margin:0 0 10px">Lista de devedores</h3>
        <div class="list" id="listaCobrancas"></div>
      </div>
    </section>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzH4m2rIWkzHLf_SPldVWBk6uSbhmwWz_OLZENRr0A-9XOzCtHsU5fbLtJCm-ZKss0k/exec";
    const REFRESH_MS = 15 * 60 * 1000;

    let DATA = { clientes: [], produtos: [], vendas: [], recebimentos: [], cobrancas: [] };

    function pad2(n){ return String(n).padStart(2,'0'); }
    function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
    function brMoney(v){ return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
    function escapeHtml(str){ return String(str==null?'':str).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#39;"); }
    function safeJson(text, fallback){ try{return JSON.parse(text);}catch(e){return fallback;} }
    function rowStamp(row){ return new Date(row.updatedAt||row.data||row.createdAt||0).getTime()||0; }
    function activeRows(rows){ return (rows||[]).filter(r => !r.deletedAt); }

    function ymdFromAny(v){
      if(!v) return '';
      const s = String(v).trim();
      if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
      if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) {
        const [dd,mm,yy] = s.split('/');
        return `${yy}-${mm}-${dd}`;
      }
      const d = new Date(s);
      if (!isNaN(d.getTime())) return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate());
      return '';
    }
    function hmFromAny(v){
      if(!v) return '';
      const s = String(v).trim();
      const m = s.match(/T(\d{2}):(\d{2})/);
      if (m) return `${m[1]}:${m[2]}`;
      const d = new Date(s);
      if (!isNaN(d.getTime())) return pad2(d.getHours()) + ':' + pad2(d.getMinutes());
      return '';
    }
    function openStatuses(text, isError){
      const el = document.getElementById('statusSync');
      const time = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      el.textContent = `${text} • ${time}`;
      el.style.color = isError ? '#b42318' : '#7c6d69';
    }

    function cardMetric(label, value, subline, color){
      return `
        <div class="card metric ${color||''}">
          <div class="label">${escapeHtml(label)}</div>
          <div class="value">${escapeHtml(value)}</div>
          <div class="subline">${escapeHtml(subline||'')}</div>
        </div>
      `;
    }

    async function carregarDados(){
      openStatuses('Atualizando...', false);
      try{
        const res = await fetch(API_URL, { method:'GET', cache:'no-store' });
        if(!res.ok) throw new Error('Falha ao buscar dados');
        const text = await res.text();
        const raw = safeJson(text, null);
        if(!raw) throw new Error('Resposta inválida do servidor');
        if(raw.ok === false) throw new Error(raw.error || 'Erro retornado pelo servidor');

        DATA.clientes = activeRows(raw.clientes || []);
        DATA.produtos = activeRows(raw.produtos || []);
        DATA.vendas = activeRows(raw.vendas || []);
        DATA.recebimentos = activeRows(raw.recebimentos || []);
        DATA.cobrancas = activeRows(raw.cobrancas || []);

        renderTudo();
        openStatuses('Atualizado com sucesso', false);
      }catch(err){
        console.error(err);
        renderTudo();
        openStatuses('Não foi possível atualizar agora', true);
      }
    }

    function isCrediarioVenda(v){
      const forma = String(v.forma_pagamento || v.forma || '').toLowerCase();
      return forma.includes('cred') || forma.includes('fiado');
    }
    function isVistaVenda(v){
      return !isCrediarioVenda(v);
    }

    function buildCaixa(dateStr){
      const vendasDia = DATA.vendas.filter(v => ymdFromAny(v.data || v.createdAt || v.updatedAt) === dateStr);
      const recebDia = DATA.recebimentos.filter(r => ymdFromAny(r.data || r.createdAt || r.updatedAt) === dateStr);

      const vendasVista = vendasDia.filter(isVistaVenda);
      const novasCred = vendasDia.filter(isCrediarioVenda);

      const totalVendasVista = vendasVista.reduce((s,v) => s + Number(v.total || 0), 0);
      const totalRecebCred = recebDia.reduce((s,r) => s + Number(r.valor || 0), 0);
      const totalNovoCred = novasCred.reduce((s,v) => s + Number(v.total || 0), 0);
      const totalCaixa = totalVendasVista + totalRecebCred;

      const formas = {};
      const ensureForma = (name) => {
        if (!formas[name]) formas[name] = { nome:name, vendas:0, recebimentos:0 };
        return formas[name];
      };

      vendasDia.forEach(v => {
        let forma = String(v.forma_pagamento || v.forma || '').trim() || 'Não informado';
        if (isCrediarioVenda(v)) forma = 'Crediário (novo)';
        const item = ensureForma(forma);
        item.vendas += Number(v.total || 0);
      });

      recebDia.forEach(r => {
        const forma = String(r.forma_pagamento || '').trim() || 'Recebimento';
        const item = ensureForma(forma);
        item.recebimentos += Number(r.valor || 0);
      });

      const movs = [];
      vendasDia.forEach(v => {
        movs.push({
          tipo:'Venda',
          nome:v.cliente || 'Balcão',
          hora:hmFromAny(v.data || v.createdAt || v.updatedAt) || '--:--',
          forma:String(v.forma_pagamento || v.forma || '-'),
          valor:Number(v.total || 0),
          stamp:rowStamp(v),
          detalheItens: (() => {
            const itens = safeJson(v.itens_json || '[]', []);
            if (!Array.isArray(itens) || !itens.length) return '';
            return itens.map(i => `${i.qtd || 1}x ${i.desc || i.nome || 'Item'}`).slice(0,3).join(', ');
          })()
        });
      });
      recebDia.forEach(r => {
        movs.push({
          tipo:'Recebimento',
          nome:resolveClienteDeRecebimento(r),
          hora:hmFromAny(r.data || r.createdAt || r.updatedAt) || '--:--',
          forma:String(r.forma_pagamento || 'Recebimento'),
          valor:Number(r.valor || 0),
          stamp:rowStamp(r),
          detalheItens:r.obs || ''
        });
      });
      movs.sort((a,b) => b.stamp - a.stamp);

      return { vendasDia, recebDia, vendasVista, novasCred, totalVendasVista, totalRecebCred, totalNovoCred, totalCaixa, formas, movs };
    }

    function renderCaixa(){
      const dateStr = document.getElementById('caixaData').value || todayStr();
      const c = buildCaixa(dateStr);

      document.getElementById('caixaCards').innerHTML = [
        cardMetric('Vendas vista', brMoney(c.totalVendasVista), `${c.vendasVista.length} venda(s)`, 'green'),
        cardMetric('Receb. crediário', brMoney(c.totalRecebCred), `${c.recebDia.length} recebimento(s)`, 'blue'),
        cardMetric('Novo crediário', brMoney(c.totalNovoCred), `${c.novasCred.length} venda(s)`, 'red'),
        cardMetric('Total caixa', brMoney(c.totalCaixa), 'Vista + recebimentos', 'gold')
      ].join('');

      const ordem = Object.values(c.formas).sort((a,b) => (b.vendas + b.recebimentos) - (a.vendas + a.recebimentos));
      document.getElementById('caixaTabelaForma').innerHTML = ordem.length
        ? ordem.map(f => `
          <tr>
            <td>${escapeHtml(f.nome)}</td>
            <td class="num">${escapeHtml(brMoney(f.vendas))}</td>
            <td class="num">${escapeHtml(brMoney(f.recebimentos))}</td>
            <td class="num">${escapeHtml(brMoney(f.vendas + f.recebimentos))}</td>
          </tr>
        `).join('') + `
          <tr>
            <td><strong>TOTAL</strong></td>
            <td class="num"><strong>${escapeHtml(brMoney(ordem.reduce((s,f)=>s+f.vendas,0)))}</strong></td>
            <td class="num"><strong>${escapeHtml(brMoney(ordem.reduce((s,f)=>s+f.recebimentos,0)))}</strong></td>
            <td class="num"><strong>${escapeHtml(brMoney(ordem.reduce((s,f)=>s+f.vendas+f.recebimentos,0)))}</strong></td>
          </tr>
        `
        : '<tr><td colspan="4" class="muted">Sem movimentações para esta data.</td></tr>';

      document.getElementById('movResumo').textContent = `${c.movs.length} movimentação(ões)`;
      document.getElementById('listaMovimentacoes').innerHTML = c.movs.length
        ? c.movs.map(m => `
          <div class="item">
            <div class="row">
              <div>
                <div><strong>${escapeHtml(m.tipo)} — ${escapeHtml(m.nome)}</strong></div>
                <div class="small muted">${escapeHtml(m.hora)} • ${escapeHtml(m.forma)}</div>
              </div>
              <div class="highlight">${escapeHtml(brMoney(m.valor))}</div>
            </div>
            ${m.detalheItens ? `<div class="small muted" style="margin-top:8px">${escapeHtml(m.detalheItens)}</div>` : ''}
          </div>
        `).join('')
        : '<div class="empty">Nenhuma movimentação encontrada para esta data.</div>';
    }

    function resolveClienteDeRecebimento(r){
      const vendaId = String(r.venda_id || '');
      if (vendaId.startsWith('cid:')) {
        const cid = vendaId.slice(4);
        const cli = DATA.clientes.find(c => String(c.id) === cid);
        return cli ? cli.nome : 'Cliente';
      }
      const venda = DATA.vendas.find(v => String(v.id) === vendaId);
      if (venda) return venda.cliente || 'Cliente';
      if (r.cid) {
        const cli = DATA.clientes.find(c => String(c.id) === String(r.cid));
        if (cli) return cli.nome;
      }
      return 'Cliente';
    }

    function renderRelatorios(){
      const hoje = todayStr();
      const mes = hoje.slice(0,7);

      const vendasHoje = DATA.vendas.filter(v => ymdFromAny(v.data || v.createdAt || v.updatedAt) === hoje);
      const vendasMes = DATA.vendas.filter(v => ymdFromAny(v.data || v.createdAt || v.updatedAt).startsWith(mes));
      const recebimentosMes = DATA.recebimentos.filter(r => ymdFromAny(r.data || r.createdAt || r.updatedAt).startsWith(mes));
      const totalHoje = vendasHoje.reduce((s,v)=>s+Number(v.total||0),0);
      const totalMes = vendasMes.reduce((s,v)=>s+Number(v.total||0),0);
      const recebidoMes = recebimentosMes.reduce((s,r)=>s+Number(r.valor||0),0);
      const ticketMes = vendasMes.length ? totalMes / vendasMes.length : 0;

      document.getElementById('relatorioCards').innerHTML = [
        cardMetric('Vendas hoje', brMoney(totalHoje), `${vendasHoje.length} venda(s)`, 'green'),
        cardMetric('Vendas do mês', brMoney(totalMes), `${vendasMes.length} venda(s)`, 'blue'),
        cardMetric('Recebido no mês', brMoney(recebidoMes), `${recebimentosMes.length} recebimento(s)`, 'gold'),
        cardMetric('Ticket médio mês', brMoney(ticketMes), 'Média por venda', 'red')
      ].join('');

      const topClientes = new Map();
      vendasMes.forEach(v => {
        const nome = String(v.cliente || 'Balcão');
        topClientes.set(nome, (topClientes.get(nome) || 0) + Number(v.total || 0));
      });
      const topClientesList = [...topClientes.entries()].sort((a,b)=>b[1]-a[1]).slice(0,5);
      document.getElementById('topClientes').innerHTML = topClientesList.length
        ? topClientesList.map(([nome,valor], idx) => `
          <div class="item">
            <div class="row">
              <div><strong>${idx+1}. ${escapeHtml(nome)}</strong></div>
              <div class="highlight">${escapeHtml(brMoney(valor))}</div>
            </div>
          </div>
        `).join('')
        : '<div class="empty">Sem dados suficientes no mês atual.</div>';

      const topProdutos = new Map();
      vendasMes.forEach(v => {
        const itens = safeJson(v.itens_json || '[]', []);
        if (!Array.isArray(itens)) return;
        itens.forEach(i => {
          const nome = String(i.desc || i.nome || 'Produto');
          const qtd = Number(i.qtd || 1);
          topProdutos.set(nome, (topProdutos.get(nome) || 0) + qtd);
        });
      });
      const topProdutosList = [...topProdutos.entries()].sort((a,b)=>b[1]-a[1]).slice(0,5);
      document.getElementById('topProdutos').innerHTML = topProdutosList.length
        ? topProdutosList.map(([nome,qtd], idx) => `
          <div class="item">
            <div class="row">
              <div><strong>${idx+1}. ${escapeHtml(nome)}</strong></div>
              <div class="highlight">${qtd} un.</div>
            </div>
          </div>
        `).join('')
        : '<div class="empty">Sem itens vendidos suficientes no mês atual.</div>';
    }

    function formatBrDate(ymd){
      if (!ymd || !/^\d{4}-\d{2}-\d{2}$/.test(ymd)) return '';
      const [y,m,d] = ymd.split('-');
      return `${d}/${m}/${y}`;
    }
    function resolveTelefoneCliente(nome, cid){
      const byId = DATA.clientes.find(c => String(c.id || '') === String(cid || ''));
      const raw = byId ? (byId.telefone || byId.tel || '') : '';
      if (raw) return String(raw).replace(/\D/g,'');
      const byName = DATA.clientes.find(c => String(c.nome || '').toLowerCase() === String(nome || '').toLowerCase());
      const raw2 = byName ? (byName.telefone || byName.tel || '') : '';
      return raw2 ? String(raw2).replace(/\D/g,'') : '';
    }
    function montarMensagem(nome, valor, vencimento, tom){
      const dataTxt = formatBrDate(vencimento) || 'sem data definida';
      if (tom === 'leve') {
        return `Olá ${nome}, tudo bem? Passando para lembrar sobre o valor pendente de ${valor}, com vencimento em ${dataTxt}. Qualquer dúvida, me chame.`;
      }
      return `Olá ${nome}. Identificamos um pagamento pendente no valor de ${valor}, com vencimento em ${dataTxt}. Pedimos, por gentileza, a regularização. Obrigado.`;
    }
    function enviarWhatsapp(tel, msg){
      const url = tel ? `https://wa.me/${tel}?text=${encodeURIComponent(msg)}` : `https://wa.me/?text=${encodeURIComponent(msg)}`;
      window.open(url, '_blank');
    }
    async function copiarMensagem(msg){
      try{
        await navigator.clipboard.writeText(msg);
        openStatuses('Mensagem copiada', false);
      }catch(e){
        openStatuses('Não foi possível copiar', true);
      }
    }

    function buildDebtEntries(){
      const map = new Map();
      const keyOf = (cid, nome) => `${cid || ''}||${String(nome || '').trim().toLowerCase()}`;

      // 1) cobranças explícitas abertas
      const explicitByVid = new Set();
      DATA.cobrancas.forEach(c => {
        const st = String(c.status || 'aberto').toLowerCase();
        if (st === 'pago') return;
        const valor = Number(c.valor || 0);
        if (valor <= 0) return;
        const nome = c.cliente || resolveNomeClientePorCid(c.cid) || 'Cliente';
        const key = keyOf(c.cid, nome);
        if (!map.has(key)) {
          map.set(key, { cid:String(c.cid || ''), nome, telefone:resolveTelefoneCliente(nome, c.cid), total:0, vencimento:'', itens:[] });
        }
        const row = map.get(key);
        row.total += valor;
        const vcto = ymdFromAny(c.vencimento || c.data || '');
        if (vcto && (!row.vencimento || vcto < row.vencimento)) row.vencimento = vcto;
        row.itens.push({ origem:'cobranca', descricao:c.descricao || 'Cobrança', valor });
        if (c.vid) explicitByVid.add(String(c.vid));
      });

      // 2) vendas em crediário que não viraram cobrança explícita
      const pagamentosPorVenda = new Map();
      const pagamentosPorCid = new Map();
      DATA.recebimentos.forEach(r => {
        const valor = Number(r.valor || 0);
        if (valor <= 0) return;
        const vid = String(r.venda_id || '');
        if (vid && !vid.startsWith('cid:')) {
          pagamentosPorVenda.set(vid, (pagamentosPorVenda.get(vid) || 0) + valor);
        }
        let cid = '';
        if (vid.startsWith('cid:')) cid = vid.slice(4);
        if (!cid && r.cid) cid = String(r.cid);
        if (cid) pagamentosPorCid.set(cid, (pagamentosPorCid.get(cid) || 0) + valor);
      });

      DATA.vendas.filter(isCrediarioVenda).forEach(v => {
        const vid = String(v.id || '');
        if (vid && explicitByVid.has(vid)) return;
        const nome = v.cliente || 'Cliente';
        const cid = String(v.cid || '');
        let saldo = Number(v.total || 0);

        if (vid && pagamentosPorVenda.has(vid)) {
          saldo -= pagamentosPorVenda.get(vid);
        } else if (cid && pagamentosPorCid.has(cid)) {
          // fallback quando recebimento não referencia a venda
          saldo -= pagamentosPorCid.get(cid);
        }

        if (saldo <= 0.009) return;

        const key = keyOf(cid, nome);
        if (!map.has(key)) {
          map.set(key, { cid, nome, telefone:resolveTelefoneCliente(nome, cid), total:0, vencimento:'', itens:[] });
        }
        const row = map.get(key);
        row.total += saldo;
        const baseData = ymdFromAny(v.data || v.createdAt || v.updatedAt || '');
        if (baseData && (!row.vencimento || baseData < row.vencimento)) row.vencimento = baseData;
        row.itens.push({ origem:'venda', descricao:'Venda no crediário', valor:saldo, vid });
      });

      return [...map.values()].filter(x => x.total > 0.009);
    }

    function resolveNomeClientePorCid(cid){
      if (!cid) return '';
      const cli = DATA.clientes.find(c => String(c.id || '') === String(cid));
      return cli ? (cli.nome || '') : '';
    }

    function statusDebt(row){
      const hoje = todayStr();
      const v = row.vencimento || '';
      if (v && v < hoje) return { text:'Vencida', cls:'danger' };
      if (v && v === hoje) return { text:'Vence hoje', cls:'warn' };
      return { text:'Em aberto', cls:'' };
    }

    function renderCobrancas(){
      const busca = document.getElementById('buscaCobranca').value.trim().toLowerCase();
      const filtro = document.getElementById('filtroCobranca').value;
      const hoje = todayStr();

      let rows = buildDebtEntries();

      rows = rows.filter(r => !busca || String(r.nome || '').toLowerCase().includes(busca));

      rows = rows.filter(r => {
        const v = r.vencimento || '';
        if (filtro === 'vencidas') return v && v < hoje;
        if (filtro === 'hoje') return v === hoje;
        if (filtro === 'proximas') return v && v > hoje;
        if (filtro === 'abertas') return true;
        return true;
      });

      rows.sort((a,b) => {
        const av = a.vencimento || '9999-99-99';
        const bv = b.vencimento || '9999-99-99';
        return av.localeCompare(bv) || b.total - a.total;
      });

      const totalAberto = rows.reduce((s,r)=>s+r.total,0);
      const vencidas = rows.filter(r => r.vencimento && r.vencimento < hoje).length;

      document.getElementById('cobrancaCards').innerHTML = [
        cardMetric('Qtd. listada', String(rows.length), 'Devedores encontrados', 'blue'),
        cardMetric('Em aberto', brMoney(totalAberto), 'Total pendente', 'red'),
        cardMetric('Vencidas', String(vencidas), 'Já passaram do prazo', 'gold'),
        cardMetric('Clientes', String(new Set(rows.map(r => r.nome)).size), 'Nomes distintos', 'green')
      ].join('');

      document.getElementById('listaCobrancas').innerHTML = rows.length
        ? rows.map(r => {
            const st = statusDebt(r);
            const valor = brMoney(r.total);
            const msgLeve = montarMensagem(r.nome, valor, r.vencimento, 'leve');
            const msgNormal = montarMensagem(r.nome, valor, r.vencimento, 'normal');
            const detalhe = r.itens.slice(0,3).map(i => `${i.descricao}: ${brMoney(i.valor)}`).join(' • ');
            return `
              <div class="item">
                <div class="row">
                  <div>
                    <div><strong>${escapeHtml(r.nome)}</strong></div>
                    <div class="small muted">Vencimento: ${escapeHtml(formatBrDate(r.vencimento) || '-')}</div>
                  </div>
                  <div style="text-align:right">
                    <div class="highlight">${escapeHtml(valor)}</div>
                    <div class="badge ${st.cls}">${escapeHtml(st.text)}</div>
                  </div>
                </div>
                ${detalhe ? `<div class="small muted" style="margin-top:8px">${escapeHtml(detalhe)}</div>` : ''}
                <div class="actions">
                  <button class="btn" onclick='enviarWhatsapp(${JSON.stringify(r.telefone || "")}, ${JSON.stringify(msgNormal)})'>Enviar cobrança</button>
                  <button class="btn light" onclick='copiarMensagem(${JSON.stringify(msgLeve)})'>Copiar leve</button>
                  <button class="btn light" onclick='copiarMensagem(${JSON.stringify(msgNormal)})'>Copiar normal</button>
                </div>
              </div>
            `;
          }).join('')
        : '<div class="empty">Nenhum devedor encontrado com os filtros atuais.</div>';
    }

    function renderTudo(){
      renderCaixa();
      renderRelatorios();
      renderCobrancas();
    }

    function bindEvents(){
      document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById(btn.dataset.view).classList.add('active');
        });
      });

      document.getElementById('btnAtualizarTop').addEventListener('click', carregarDados);
      document.getElementById('btnConsultarCaixa').addEventListener('click', renderCaixa);
      document.getElementById('btnHoje').addEventListener('click', () => {
        document.getElementById('caixaData').value = todayStr();
        renderCaixa();
      });
      document.getElementById('buscaCobranca').addEventListener('input', renderCobrancas);
      document.getElementById('filtroCobranca').addEventListener('change', renderCobrancas);
      document.getElementById('caixaData').addEventListener('change', renderCaixa);

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') carregarDados();
      });
      window.addEventListener('focus', carregarDados);
    }

    function init(){
      document.getElementById('caixaData').value = todayStr();
      bindEvents();
      renderTudo();
      carregarDados();
      setInterval(carregarDados, REFRESH_MS);
    }

    init();
  </script>
</body>
</html>
